<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Disaster Response System</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); } 
        else if (window.matchMedia('(prefers-color-scheme: light)').matches) { document.documentElement.setAttribute('data-theme', 'light'); }
    </script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <button class="theme-toggle-btn" onclick="toggleTheme()">
        <script>document.write(document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️')</script>
    </button>
    
    <div class="auth-wrapper">
        <div class="glass-panel auth-card">
            <h2 style="text-align: center; color: var(--primary);">Secure Registration</h2>
            <p style="text-align: center; margin-bottom: 2rem;">Join the Disaster Response Network</p>
            
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                
                <div class="grid grid-cols-2">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" required placeholder="+1 234 567 8900">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Home Address</label>
                    <textarea id="address" required placeholder="123 Main St, City, Country" style="min-height: 80px;"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Emergency Contact (Family Member)</label>
                    <input type="tel" id="emergency-contact" required placeholder="+1 098 765 4321">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div class="form-group">
                    <label>Verify Phone or Email</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="otp" required placeholder="Enter 4-digit OTP" style="flex: 1;">
                        <button type="button" class="btn btn-outline" onclick="sendOTP()">Send OTP</button>
                    </div>
                    <small style="color: var(--text-muted); display: block; margin-top: 5px;">We will simulate sending a code to your provided email/phone.</small>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Register Account</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Already have an account? <a href="login.html">Login here</a>
            </p>
            <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                <a href="admin.html" style="color: var(--danger); font-size: 0.875rem;">Are you a Responder / Admin? Click here</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
