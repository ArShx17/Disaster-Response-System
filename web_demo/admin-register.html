<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - AI Disaster Response System</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); } 
        else if (window.matchMedia('(prefers-color-scheme: light)').matches) { document.documentElement.setAttribute('data-theme', 'light'); }
    </script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-toggle-btn">
        <script>document.write(document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️')</script>
    </button>
    
    <div class="auth-wrapper">
        <div class="glass-panel auth-card" style="border-color: var(--danger);">
            <h2 style="text-align: center; color: var(--danger);">Government Registration</h2>
            <p style="text-align: center; margin-bottom: 2rem;">Authorized Personnel Only</p>
            
            <form id="admin-register-form">
                <div class="form-group">
                    <label>Full Officer Name</label>
                    <input type="text" id="admin-name" required placeholder="Officer Jane Doe">
                </div>
                
                <div class="form-group">
                    <label>Admin ID / Badge Number</label>
                    <input type="text" id="admin-id" required placeholder="E.g. RESCUE-001">
                </div>
                
                <div class="form-group">
                    <label>Department / Jurisdiction</label>
                    <input type="text" id="admin-dept" required placeholder="E.g. National Guard">
                </div>
                
                <div class="form-group">
                    <label>Secure Passcode</label>
                    <input type="password" id="admin-pass" required placeholder="••••••••">
                </div>
                
                <div class="form-group">
                    <label>Government Security Clearance Code</label>
                    <input type="password" id="admin-clearance" required placeholder="Enter Secret Key (Demo: 1234)">
                    <small style="color: var(--text-muted); display: block; margin-top: 5px;">Prevents unauthorized admin creation.</small>
                </div>
                
                <button type="submit" class="btn btn-danger btn-block" style="margin-top: 1rem;">Register Admin Account</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Already have an admin account? <a href="admin.html" style="color: var(--danger);">Login here</a>
            </p>
            <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                <a href="index.html" style="color: var(--primary); font-size: 0.875rem;">Return to Citizen Dashboard</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Disable regular citizen auth check for this admin page
        window.requireAuth = function() {}; 
        
        // Initialize admins array if not exists
        if (!localStorage.getItem('admins')) {
            localStorage.setItem('admins', JSON.stringify([]));
        }

        document.getElementById('admin-register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('admin-name').value;
            const adminId = document.getElementById('admin-id').value;
            const dept = document.getElementById('admin-dept').value;
            const pass = document.getElementById('admin-pass').value;
            const clearance = document.getElementById('admin-clearance').value;
            
            // Demo clearance check
            if (clearance !== '1234') {
                showToast('Invalid Security Clearance Code!', 'danger');
                return;
            }
            
            const admins = JSON.parse(localStorage.getItem('admins'));
            
            // Check if Admin ID is already taken
            if (admins.find(a => a.adminId === adminId) || adminId.toLowerCase() === 'admin') {
                showToast('Admin ID is already in use.', 'danger');
                return;
            }
            
            const newAdmin = {
                id: Date.now(),
                name,
                adminId,
                department: dept,
                password: pass
            };
            
            admins.push(newAdmin);
            localStorage.setItem('admins', JSON.stringify(admins));
            
            showToast('Government account created successfully!', 'success');
            
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1500);
        });
    </script>
</body>
</html>
